name: 监控GitHub PR合并→飞书通知
on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟查一次
  workflow_dispatch:  # 可手动运行

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检查原仓库PR
        uses: actions/github-script@v7
        with:
          script: |
            // ============== 只改下面这2行 ==============
            const TARGET_REPO = "https://github.com/ChaoWao/simpler";  // 你要监控的原仓库
            const FEISHU_WEBHOOK = "https://open.feishu.cn/open-apis/bot/v2/hook/167dcd0b-dab8-40c4-94d7-c43da40846a8";
            // ===========================================

            const [owner, repo] = TARGET_REPO.split("/");

            // 拉取最近关闭的PR
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              state: "closed",
              sort: "updated",
              direction: "desc",
              per_page: 10
            });

            // 只看【已合并】的
            const mergedPRs = prs.filter(p => p.merged_at);
            if (mergedPRs.length === 0) return;

            const pr = mergedPRs[0];
            const msg = {
              msg_type: "text",
              content: {
                text: `✅ PR 已合并
仓库：${TARGET_REPO}
编号：#${pr.number}
标题：${pr.title}
合并人：${pr.merged_by?.login || "unknown"}
链接：${pr.html_url}`
              }
            };

            // 发送到飞书
            await fetch(FEISHU_WEBHOOK, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(msg)
            });

            console.log("已发送飞书通知");
