name: 监控GitHub PR合并→飞书通知
on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟检查一次
  workflow_dispatch:       # 支持手动触发

jobs:
  check_pr:
    runs-on: ubuntu-latest
    steps:
      - name: 检查原仓库已合并PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ========== 只改这2行 ==========
            const TARGET_REPO = "ChaoWao/simpler";  // 监控的仓库（用户名/仓库名）
            const FEISHU_WEBHOOK = "https://open.feishu.cn/open-apis/bot/v2/hook/167dcd0b-dab8-40c4-94d7-c43da40846a8";
            // ==============================

            // 拆分仓库用户名和仓库名
            const [owner, repo] = TARGET_REPO.split("/");
            
            // 【修复版】翻译函数（百度翻译，稳定无密钥）
            async function translateToZh(text) {
              if (!text || text.trim() === "") return "无内容";
              try {
                // 百度翻译简易接口（无需申请密钥，稳定免费）
                const encodeText = encodeURIComponent(text);
                const url = `https://fanyi.baidu.com/sug?kw=${encodeText}`;
                const res = await fetch(url, {
                  headers: {
                    "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                  }
                });
                const data = await res.json();
                // 提取翻译结果（优先取第一个候选翻译）
                if (data.data && data.data.length > 0) {
                  return data.data[0].v || text;
                }
                // 若短句翻译无结果，用整句翻译兜底
                const fullUrl = `https://fanyi.baidu.com/transapi?from=en&to=zh&query=${encodeText}`;
                const fullRes = await fetch(fullUrl, {
                  headers: {
                    "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                  }
                });
                const fullData = await fullRes.json();
                if (fullData.data && fullData.data[0] && fullData.data[0].dst) {
                  return fullData.data[0].dst;
                }
                return text;
              } catch (e) {
                console.error("翻译失败：", e.message);
                return text; // 最终兜底返回原文
              }
            }

            // 提取PR核心内容（去格式+限长度）
            function extractCoreContent(body) {
              if (!body) return "无详细描述";
              // 去掉markdown格式、多余空行
              const pureText = body.replace(/[#*`>]/g, "").replace(/\n+/g, "\n").trim();
              // 限制长度，避免翻译接口超限
              return pureText.length > 500 ? pureText.substring(0, 500) + "..." : pureText;
            }
            
            try {
              // 调用GitHub API获取最近关闭的PR
              const { data: prs } = await github.rest.pulls.list({
                owner: owner,
                repo: repo,
                state: "closed",
                sort: "updated",
                direction: "desc",
                per_page: 10
              });

              // 筛选出已合并的PR
              const mergedPRs = prs.filter(pr => pr.merged_at);
              if (mergedPRs.length === 0) {
                console.log("暂无新合并的PR");
                return;
              }

              // 取最新合并的PR
              const latestPR = mergedPRs[0];
              
              // 1. 提取关键信息
              const prNumber = latestPR.number;
              const originalTitle = latestPR.title || "无标题";
              const originalContent = extractCoreContent(latestPR.body);
              const mergedBy = latestPR.merged_by ? latestPR.merged_by.login : "未知";
              const prUrl = latestPR.html_url;

              // 2. 确保翻译完成（await不能少）
              const zhTitle = await translateToZh(originalTitle);
              const zhContent = await translateToZh(originalContent);

              // 3. 构造飞书通知内容（格式正确+翻译生效）
              const feishuMessage = {
                msg_type: "text",
                content: {
                  text: `✅ PR已合并（中文汇报）\n仓库：${TARGET_REPO}\n编号：#${prNumber}\n【标题】\n英文：${originalTitle}\n中文：${zhTitle}\n【核心内容】\n英文：${originalContent}\n中文：${zhContent}\n合并人：${mergedBy}\nPR链接：${prUrl}`
                }
              };

              // 发送到飞书机器人
              const response = await fetch(FEISHU_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(feishuMessage)
              });

              // 打印结果便于排查
              const responseText = await response.text();
              console.log("飞书通知发送结果：", responseText);
              console.log("翻译结果-标题：", zhTitle); // 日志打印翻译结果，方便排查
            } catch (error) {
              console.error("执行出错：", error.message);
            }
