name: 监控GitHub PR合并→飞书通知
on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟检查一次
  workflow_dispatch:       # 支持手动触发

jobs:
  check_pr:
    runs-on: ubuntu-latest
    steps:
      - name: 检查原仓库已合并PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ========== 只改这2行 ==========
            const TARGET_REPO = "ChaoWao/simpler";  // 监控的仓库（用户名/仓库名）
            const FEISHU_WEBHOOK = "https://open.feishu.cn/open-apis/bot/v2/hook/167dcd0b-dab8-40c4-94d7-c43da40846a8";
            // ==============================

            // 拆分仓库用户名和仓库名
            const [owner, repo] = TARGET_REPO.split("/");
            
            // 【时间格式化函数】将GitHub UTC时间转为北京时间（YYYY-MM-DD HH:mm:ss）
            function formatMergedTime(isoUtcTime) {
              if (!isoUtcTime) return "未知合入时间";
              // 解析UTC时间并转为北京时间（UTC+8）
              const utcDate = new Date(isoUtcTime);
              const beijingDate = new Date(utcDate.getTime() + 8 * 60 * 60 * 1000); // 加8小时时差
              // 格式化输出：2024-05-20 14:30:25
              return beijingDate.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZone: 'Asia/Shanghai'
              }).replace(/\//g, '-'); // 替换斜杠为横线，格式更统一
            }

            // 【正式版】百度翻译API函数（读取GitHub Secret，带签名验证）
            async function translateToZh(text) {
              if (!text || text.trim() === "") return "无内容";
              
              // 1. 从GitHub Secrets读取百度翻译密钥
              const BAIDU_APP_ID = ${{ secrets.BAIDU_APP_ID }};
              const BAIDU_SECRET_KEY = "${{ secrets.BAIDU_SECRET_KEY }}";
              
              // 校验密钥是否配置
              if (!BAIDU_APP_ID || !BAIDU_SECRET_KEY) {
                console.error("百度翻译密钥未配置：请检查BAIDU_APP_ID/BAIDU_SECRET_KEY");
                return text;
              }

              try {
                // 2. 生成百度API要求的签名（防篡改）
                const salt = Date.now().toString(); // 随机盐值
                const signStr = BAIDU_APP_ID + text + salt + BAIDU_SECRET_KEY;
                // 计算MD5签名
                const crypto = require('crypto');
                const sign = crypto.createHash('md5').update(signStr).digest('hex');

                // 3. 构造API请求参数
                const params = new URLSearchParams({
                  q: text,
                  from: 'en', // 源语言：英文
                  to: 'zh',   // 目标语言：中文
                  appid: BAIDU_APP_ID,
                  salt: salt,
                  sign: sign
                });

                // 4. 调用百度翻译正式API
                const response = await fetch(`https://fanyi-api.baidu.com/api/trans/vip/translate?${params}`, {
                  method: 'GET',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });

                // 5. 解析翻译结果
                const data = await response.json();
                console.log("百度翻译API返回：", JSON.stringify(data)); // 日志便于排查

                // 处理API返回码（0=成功，其他=失败）
                if (data.error_code) {
                  console.error(`翻译失败（${data.error_code}）：${data.error_msg}`);
                  return text; // 失败时返回原文
                }

                // 提取翻译后的文本（支持多行）
                const translated = data.trans_result?.map(item => item.dst).join('\n') || text;
                return translated;

              } catch (e) {
                console.error("翻译API调用异常：", e.message);
                return text; // 异常时返回原文
              }
            }

            // 提取PR核心内容（去格式+限长度）
            function extractCoreContent(body) {
              if (!body) return "无详细描述";
              // 去掉markdown格式、多余空行
              const pureText = body.replace(/[#*`>]/g, "").replace(/\n+/g, "\n").trim();
              // 限制长度，避免翻译接口超限
              return pureText.length > 500 ? pureText.substring(0, 500) + "..." : pureText;
            }
            
            try {
              // 调用GitHub API获取最近关闭的PR
              const { data: prs } = await github.rest.pulls.list({
                owner: owner,
                repo: repo,
                state: "closed",
                sort: "updated",
                direction: "desc",
                per_page: 10
              });

              // 筛选出已合并的PR
              const mergedPRs = prs.filter(pr => pr.merged_at);
              if (mergedPRs.length === 0) {
                console.log("暂无新合并的PR");
                return;
              }

              // 取最新合并的PR
              const latestPR = mergedPRs[0];
              
              // 1. 提取关键信息（新增合入时间）
              const prNumber = latestPR.number;
              const originalTitle = latestPR.title || "无标题";
              const originalContent = extractCoreContent(latestPR.body);
              const creator = latestPR.user?.login || "未知创建者"; // PR创建者（必含）
              const mergedBy = latestPR.merged_by ? latestPR.merged_by.login : "未知合并人"; // 合并人（可选）
              const mergedAt = formatMergedTime(latestPR.merged_at); // 合入时间（格式化后的北京时间）

              // 2. 确保翻译完成（await不能少）
              const zhTitle = await translateToZh(originalTitle);
              const zhContent = await translateToZh(originalContent);

              // 3. 构造飞书通知内容（新增合入时间）
              const feishuMessage = {
                msg_type: "text",
                content: {
                  text: `✅ PR已合并（中文汇报）\n仓库：${TARGET_REPO}\n编号：#${prNumber}\n合入时间：${mergedAt}\n【标题】\n英文：${originalTitle}\n中文：${zhTitle}\n【核心内容】\n英文：${originalContent}\n中文：${zhContent}\n创建者：${creator}\n合并人：${mergedBy}\nPR链接：${prUrl}`
                }
              };

              // 发送到飞书机器人
              const response = await fetch(FEISHU_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(feishuMessage)
              });

              // 打印结果便于排查
              const responseText = await response.text();
              console.log("飞书通知发送结果：", responseText);
              console.log("翻译结果-标题：", zhTitle); // 日志打印翻译结果，方便排查
            } catch (error) {
              console.error("执行出错：", error.message);
            }
