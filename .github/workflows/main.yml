name: 监控GitHub PR合并→飞书通知
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check_pr:
    runs-on: ubuntu-latest
    steps:
      - name: 检查原仓库已合并PR
        uses: actions/github-script@v7
        env:
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_SECRET_KEY: ${{ secrets.BAIDU_SECRET_KEY }}
          FEISHU_WEBHOOK: "https://open.feishu.cn/open-apis/bot/v2/hook/167dcd0b-dab8-40c4-94d7-c43da40846a8"
          TARGET_REPO: "ChaoWao/simpler"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const TARGET_REPO = process.env.TARGET_REPO;
            const FEISHU_WEBHOOK = process.env.FEISHU_WEBHOOK;
            const BAIDU_APP_ID = process.env.BAIDU_APP_ID;
            const BAIDU_SECRET_KEY = process.env.BAIDU_SECRET_KEY;

            const [owner, repo] = TARGET_REPO.split("/");

            // ======================
            // 时间修复版（正确北京时间）
            // ======================
            function formatMergedTime(isoUtcTime) {
              if (!isoUtcTime) return "未知合入时间";
              const date = new Date(isoUtcTime);
              return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZone: 'Asia/Shanghai'
              }).replace(/\//g, '-');
            }

            // 翻译函数
            async function translateToZh(text) {
              if (!text || text.trim() === "") return "无内容";
              if (!BAIDU_APP_ID || !BAIDU_SECRET_KEY) {
                console.warn("未配置百度翻译，使用原文");
                return text;
              }

              try {
                const crypto = require('crypto');
                const salt = Date.now().toString();
                const signStr = BAIDU_APP_ID + text + salt + BAIDU_SECRET_KEY;
                const sign = crypto.createHash('md5').update(signStr).digest('hex');

                const params = new URLSearchParams({
                  q: text,
                  from: 'en',
                  to: 'zh',
                  appid: BAIDU_APP_ID,
                  salt: salt,
                  sign: sign
                });

                const res = await fetch(`https://fanyi-api.baidu.com/api/trans/vip/translate?${params}`);
                const data = await res.json();

                if (data.error_code) {
                  console.error("翻译失败", data.error_code);
                  return text;
                }
                return data.trans_result?.map(i => i.dst).join('\n') || text;
              } catch (e) {
                console.error("翻译异常", e);
                return text;
              }
            }

            function extractCoreContent(body) {
              if (!body) return "无详细描述";
              const pure = body.replace(/[#*`>]/g, "").replace(/\n+/g, "\n").trim();
              return pure.length > 500 ? pure.substring(0, 500) + "..." : pure;
            }

            // 主逻辑
            try {
              const { data: prs } = await github.rest.pulls.list({
                owner, repo,
                state: "closed",
                sort: "updated",
                direction: "desc",
                per_page: 10
              });

              const mergedPRs = prs.filter(pr => pr.merged_at);
              if (mergedPRs.length === 0) {
                console.log("暂无新合并PR");
                return;
              }

              const pr = mergedPRs[0];
              const prNumber = pr.number;
              const title = pr.title || "无标题";
              const content = extractCoreContent(pr.body);
              const creator = pr.user?.login || "未知创建者";
              const merger = pr.merged_by?.login || "未知合并人";
              const mergedAt = formatMergedTime(pr.merged_at);

              const zhTitle = await translateToZh(title);
              const zhContent = await translateToZh(content);

              const msg = {
                msg_type: "text",
                content: {
                  text: `✅ PR已合并（中文汇报）
仓库：${TARGET_REPO}
编号：#${prNumber}
合入时间：${mergedAt}
【标题】
英文：${title}
中文：${zhTitle}
【核心内容】
英文：${content}
中文：${zhContent}
创建者：${creator}
合并人：${merger}
PR链接：${pr.html_url}`
                }
              };

              await fetch(FEISHU_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(msg)
              });

              console.log("已发送飞书通知");

            } catch (err) {
              console.error("失败：", err.message);
              await fetch(FEISHU_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  msg_type: "text",
                  content: { text: `❌ 监控失败：${err.message}` }
                })
              });
            }
