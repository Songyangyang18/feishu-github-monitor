name: 监控GitHub PR合并→飞书通知
on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟检查一次
  workflow_dispatch:       # 支持手动触发

jobs:
  check_pr:
    runs-on: ubuntu-latest
    steps:
      - name: 检查原仓库已合并PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ========== 只改这2行 ==========
            const TARGET_REPO = "https://github.com/ChaoWao/simpler";  // 替换成你要监控的原仓库（用户名/仓库名）
            const FEISHU_WEBHOOK = "https://open.feishu.cn/open-apis/bot/v2/hook/167dcd0b-dab8-40c4-94d7-c43da40846a8";
            // ==============================

            // 拆分仓库用户名和仓库名
            const [owner, repo] = TARGET_REPO.split("/");
            
            try {
              // 调用GitHub API获取最近关闭的PR
              const { data: prs } = await github.rest.pulls.list({
                owner: owner,
                repo: repo,
                state: "closed",
                sort: "updated",
                direction: "desc",
                per_page: 10
              });

              // 筛选出已合并的PR
              const mergedPRs = prs.filter(pr => pr.merged_at);
              if (mergedPRs.length === 0) {
                console.log("暂无新合并的PR");
                return;
              }

              // 取最新合并的PR
              const latestPR = mergedPRs[0];
              
              // 构造飞书通知内容（单行写法避免YAML换行报错）
              const feishuMessage = {
                msg_type: "text",
                content: {
                  text: `✅ PR已合并\n仓库：${TARGET_REPO}\n编号：#${latestPR.number}\n标题：${latestPR.title || "无标题"}\n合并人：${latestPR.merged_by ? latestPR.merged_by.login : "未知"}\n链接：${latestPR.html_url}`
                }
              };

              // 发送到飞书机器人
              const response = await fetch(FEISHU_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(feishuMessage)
              });

              // 打印结果便于排查
              const responseText = await response.text();
              console.log("飞书通知发送结果：", responseText);
            } catch (error) {
              console.error("执行出错：", error.message);
            }
